{{ define "above-main" }}
<div class="page-banner">
  <div class="page-banner-inner">
    <h1>{{ .Title }}</h1>
  </div>
</div>
{{ end }}

{{ define "main" }}
<nav class="breadcrumb">
  <a href="{{ "/" | relURL }}">Home</a> &rsaquo;
  <a href="{{ "/news/" | relURL }}">News</a> &rsaquo;
  {{ .Title }}
</nav>

<article class="news-single">
  <time class="news-date">{{ .Date.Format "Jan 2nd, 2006" }}</time>
  {{ .Content }}
</article>
{{ end }}
