github:
  description: "Apache ActiveMQ Website"
  homepage: https://activemq.apache.org
  labels:
    - website
    - jekyll
  rulesets:
    - name: "Default Branch Protection"
      type: branch
      branches:
        includes:
          - "~DEFAULT_BRANCH"
          - "release/*"
          - "rel/*"
        excludes: []
      bypass_teams:
        - root
      restrict_deletion: true
      restrict_force_push: true
jekyll:
  whoami: main
  target: asf-site
